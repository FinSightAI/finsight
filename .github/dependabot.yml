version: 2
updates:
  # Root (test scripts, playwright, etc.)
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
    commit-message:
      prefix: "deps"
      include: scope
  # Cloud Functions — separate package.json
  - package-ecosystem: npm
    directory: "/functions"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Jerusalem
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - security
      - functions
    commit-message:
      prefix: "deps(functions)"
      include: scope
