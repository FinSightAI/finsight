name: Uptime ping — WizeMoney

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit production URL
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://money.wizelife.ai/)
          echo "HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "::warning::WizeMoney returned $STATUS"
            exit 1
          fi
