name: Uptime ping — WizeMoney

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit production URL
        run: |
          # Cloudflare orange-proxy returns 403 to datacenter IPs (GitHub Actions).
          # 403 still means the site is responding, so we accept it as "alive".
          # Only fail on 5xx / timeout / DNS errors.
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; WizeLife-Uptime/1.0; +https://wizelife.ai)" \
            -L https://money.wizelife.ai/)
          echo "WizeMoney HTTP $STATUS"
          if [ "$STATUS" = "000" ] || [ "$STATUS" -ge 500 ]; then
            echo "::error::WizeMoney returned $STATUS — possible outage"
            exit 1
          fi
