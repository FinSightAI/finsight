name: Uptime ping — WizeMoney

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Hit production URL
        run: |
          # User-Agent prevents bot-detection 403 responses.
          # Accept 2xx and 3xx (redirects mean server is alive).
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
            -H "User-Agent: Mozilla/5.0 (compatible; WizeLife-Uptime/1.0; +https://wizelife.ai)" \
            -L https://money.wizelife.ai/)
          echo "HTTP $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::warning::WizeMoney returned $STATUS"
            exit 1
          fi
