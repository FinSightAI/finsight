<!DOCTYPE html>

<head>
<meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-MPRTN6CJ9K"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-MPRTN6CJ9K');
    </script>
<script>
  // 1. Unregister all stale service workers (fixes old PWA installs with wrong scope)
  // 2. Redirect to correct URL
  function redirect() {
    var path = window.location.pathname;
    var fixed = path.replace(/\/FinSight/gi, '/finsight');
    var target = (fixed !== path) ? fixed : '/finsight/';
    window.location.replace(target + window.location.search + window.location.hash);
  }

  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.getRegistrations().then(function(registrations) {
      var unregisterAll = registrations.map(function(r) { return r.unregister(); });
      Promise.all(unregisterAll).then(redirect);
    }).catch(redirect);
  } else {
    redirect();
  }
</script>
</head>

</html>
