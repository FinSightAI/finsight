<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DB63NWYGX5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DB63NWYGX5');
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../img/logo.png">
    <meta name="theme-color" content="#8b5cf6">
    <title>יועץ AI – FinSight</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="app-container">
    <!-- Sidebar -->
        <aside class="sidebar"></aside>

    <!-- Main -->
    <main class="main-content" style="padding:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;">

        <!-- Top bar -->
        <div style="padding:18px 24px 14px;border-bottom:1px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div>
                <h1 style="font-size:1.4rem;font-weight:700;margin:0;">🤖 יועץ פיננסי AI</h1>
                <p style="color:var(--color-text-secondary);font-size:0.82rem;margin:3px 0 0;">שואל, מנתח, ממליץ — על בסיס הנתונים האמיתיים שלך</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <span id="apiStatus" style="font-size:0.78rem;padding:4px 10px;border-radius:99px;background:var(--color-bg-hover);color:var(--color-text-secondary);">בודק חיבור...</span>
                <button onclick="clearChat()" style="padding:7px 14px;border-radius:9px;background:var(--color-bg-hover);border:1px solid var(--color-border);color:var(--color-text-secondary);font-size:0.82rem;cursor:pointer;">🗑 נקה</button>
            </div>
        </div>

        <!-- Suggested questions (shown only when chat is empty) -->
        <div id="suggestions" style="padding:20px 24px 0;flex-shrink:0;">
            <p style="color:var(--color-text-secondary);font-size:0.8rem;margin:0 0 10px;">שאלות לדוגמה:</p>
            <div style="display:flex;flex-wrap:wrap;gap:8px;">
            </div>
        </div>

        <!-- Chat messages -->
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;">
            <!-- messages injected here -->
        </div>

        <!-- Input bar -->
        <div style="padding:14px 24px 20px;border-top:1px solid var(--color-border);flex-shrink:0;padding-bottom:max(20px,env(safe-area-inset-bottom));">
            <div style="display:flex;gap:10px;align-items:flex-end;">
                <textarea id="chatInput"
                    placeholder="שאל אותי כל שאלה פיננסית..."
                    rows="1"
                    style="flex:1;resize:none;padding:12px 14px;border-radius:14px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;font-family:inherit;line-height:1.4;max-height:160px;overflow-y:auto;outline:none;"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button id="sendBtn" onclick="sendMessage()"
                    style="padding:12px 18px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:14px;color:white;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;">
                    ➤
                </button>
            </div>
        </div>

    </main>
</div>


<style>
    .chat-bubble {
        max-width: 75%;
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 0.9rem;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
    }
    .chat-user {
        align-self: flex-start;
        background: linear-gradient(135deg, #8b5cf6, #6d28d9);
        color: white;
        border-radius: 18px 18px 4px 18px;
    }
    .chat-assistant {
        align-self: flex-end;
        background: var(--color-bg-card);
        border: 1px solid var(--color-border);
        border-radius: 18px 18px 18px 4px;
        color: var(--color-text-primary);
    }
    .chat-row { display: flex; }
    .chat-row.user  { justify-content: flex-start; }
    .chat-row.assistant { justify-content: flex-end; }
    .typing-dot {
        width: 7px; height: 7px;
        border-radius: 50%;
        background: var(--color-text-secondary);
        animation: typingBounce 1.2s infinite ease-in-out;
        display: inline-block;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }
    @keyframes typingBounce {
        0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
        40%           { transform: scale(1);   opacity: 1; }
    }
    .suggestion-chip {
        padding: 7px 13px;
        border-radius: 99px;
        border: 1px solid var(--color-border);
        background: var(--color-bg-card);
        color: var(--color-text-primary);
        font-size: 0.8rem;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
        white-space: nowrap;
    }
    .suggestion-chip:hover {
        background: var(--color-bg-hover);
        border-color: #8b5cf6;
        color: #8b5cf6;
    }
    .chat-assistant strong { color: #a78bfa; }
    .chat-assistant em     { color: var(--color-text-secondary); }
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/idb.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/profiles.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/i18n.js"></script>

<script>
    const CHAT_HISTORY_KEY = 'finsight_ai_chat_history';

    const SUGGESTIONS = [
        'האם כדאי לי לסגור את ההלוואה מוקדם?',
        'מתי אגיע לשווי נקי של מיליון שקל?',
        'כמה אני מוציא בממוצע על אוכל?',
        'מה הסיכון הכי גדול בתיק שלי?',
        'האם אני חוסך מספיק לפנסיה?',
        'איזה מנוי שווה לבטל?',
        'הראה לי את ה-3 הוצאות הכי גדולות שלי',
        'כמה חודשים של מרגוע פיננסי יש לי?',
    ];

    let conversationHistory = [];
    let isLoading = false;
    let _crossAppData = null; // cached after first Firestore fetch

    // ── Cross-app context (Yolo only) — reads from Firestore ──
    async function fetchCrossAppContext(uid) {
        if (_crossAppData !== null) return _crossAppData;
        const lines = [];
        try {
            const snap = await firebaseDb
                .collection('users').doc(uid)
                .collection('cross_app')
                .get();
            if (snap.empty) {
                _crossAppData = '';
                return '';
            }
            lines.push('\n=== נתונים מכלי WizeLife נוספים ===\n');
            snap.forEach(doc => {
                const d = doc.data();
                const appName = d.appName || doc.id;
                lines.push(`\n── ${appName} ──`);
                if (d.summary) lines.push(d.summary);
                if (d.updatedAt) {
                    const ts = d.updatedAt.toDate ? d.updatedAt.toDate() : new Date(d.updatedAt);
                    lines.push(`(עודכן: ${ts.toLocaleDateString('he-IL')})`);
                }
            });
        } catch(e) {
            console.warn('cross_app fetch failed:', e);
        }
        _crossAppData = lines.join('\n');
        return _crossAppData;
    }

    // ── Build rich financial context from localStorage ──
    function buildFinancialContext() {
        const lines = ['=== נתונים פיננסיים אמיתיים של המשתמש ===\n'];

        try {
            // Bank
            const bank = Storage.getBankAccounts?.() || Storage.get('finance_bank_accounts') || [];
            if (bank.length) {
                const total = bank.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
                lines.push(`**חשבונות בנק:** ${bank.length} חשבונות, יתרה כוללת ₪${total.toLocaleString()}`);
                bank.forEach(a => lines.push(`  • ${a.bankName || a.name || 'בנק'}: ₪${(parseFloat(a.balance)||0).toLocaleString()}`));
            }

            // Stocks
            const stocks = Storage.getStocks?.() || Storage.get('finance_stocks') || [];
            if (stocks.length) {
                const total = stocks.reduce((s, x) => s + (parseFloat(x.currentValue) || parseFloat(x.value) || 0), 0);
                lines.push(`\n**מניות:** ${stocks.length} אחזקות, שווי כולל ₪${total.toLocaleString()}`);
                stocks.slice(0, 6).forEach(x => lines.push(`  • ${x.symbol || x.name}: ₪${(parseFloat(x.currentValue)||parseFloat(x.value)||0).toLocaleString()}`));
            }

            // My Funds
            const funds = Storage.getMyFunds?.() || Storage.get('finance_my_funds') || [];
            if (funds.length) {
                const total = funds.reduce((s, f) => s + (parseFloat(f.currentValue) || parseFloat(f.balance) || 0), 0);
                lines.push(`\n**קרנות / פנסיה / גמל:** ${funds.length} מוצרים, שווי כולל ₪${total.toLocaleString()}`);
                funds.forEach(f => lines.push(`  • ${f.name} (${f.type||''}): ₪${(parseFloat(f.currentValue)||parseFloat(f.balance)||0).toLocaleString()}, דמי ניהול ${f.fee||'?'}%`));
            }

            // Assets
            const assets = Storage.getAssets?.() || Storage.get('finance_assets') || [];
            if (assets.length) {
                const total = assets.reduce((s, a) => s + (parseFloat(a.value) || 0), 0);
                lines.push(`\n**נכסים:** ${assets.length} פריטים, שווי כולל ₪${total.toLocaleString()}`);
                assets.forEach(a => lines.push(`  • ${a.name}: ₪${(parseFloat(a.value)||0).toLocaleString()}`));
            }

            // Loans
            const loans = Storage.getLoans?.() || Storage.get('finance_loans') || [];
            if (loans.length) {
                const total = loans.reduce((s, l) => s + (parseFloat(l.remainingBalance) || parseFloat(l.balance) || 0), 0);
                const monthlyTotal = loans.reduce((s, l) => s + (parseFloat(l.monthlyPayment) || 0), 0);
                lines.push(`\n**הלוואות:** ${loans.length} הלוואות, יתרה ₪${total.toLocaleString()}, תשלום חודשי ₪${monthlyTotal.toLocaleString()}`);
                loans.forEach(l => lines.push(`  • ${l.name||l.type||'הלוואה'}: יתרה ₪${(parseFloat(l.remainingBalance)||parseFloat(l.balance)||0).toLocaleString()}, ${l.interestRate||'?'}% ריבית, ₪${(parseFloat(l.monthlyPayment)||0).toLocaleString()}/חודש`));
            }

            // Subscriptions
            const subs = Storage.getSubscriptions?.() || Storage.get('finance_subscriptions') || [];
            if (subs.length) {
                const monthlyTotal = subs.reduce((s, x) => {
                    const amt = parseFloat(x.amount) || 0;
                    const freq = x.frequency || 'monthly';
                    const m = freq === 'annual' ? amt/12 : freq === 'quarterly' ? amt/3 : freq === 'weekly' ? amt*4.3 : amt;
                    return s + m;
                }, 0);
                lines.push(`\n**מנויים / תשלומים קבועים:** ${subs.length} פריטים, סה"כ ~₪${Math.round(monthlyTotal).toLocaleString()}/חודש`);
                subs.forEach(x => lines.push(`  • ${x.name}: ₪${x.amount} (${x.frequency||'monthly'})`));
            }

            // Goals
            const goals = Storage.get('finance_goals') || [];
            if (goals.length) {
                lines.push(`\n**יעדי חיסכון:** ${goals.length} יעדים`);
                goals.forEach(g => {
                    const pct = g.targetAmount > 0 ? Math.round(((g.currentAmount||0)/g.targetAmount)*100) : 0;
                    lines.push(`  • ${g.name}: ₪${(g.currentAmount||0).toLocaleString()} מתוך ₪${(g.targetAmount||0).toLocaleString()} (${pct}%)${g.deadline ? ', דדליין: ' + g.deadline : ''}`);
                });
            }

            // Net worth history
            const nwHistory = Storage.get('finance_networth_history') || [];
            if (nwHistory.length >= 2) {
                const last = nwHistory[nwHistory.length-1];
                const prev = nwHistory[nwHistory.length-2];
                const delta = last.value - prev.value;
                lines.push(`\n**שווי נקי:** ₪${last.value.toLocaleString()} (שינוי מחודש קודם: ${delta >= 0 ? '+' : ''}₪${delta.toLocaleString()})`);
            }

            // Credit cards
            const credit = Storage.get('finance_credit_cards') || [];
            if (credit.length) {
                const debt = credit.reduce((s, c) => s + (parseFloat(c.balance) || 0), 0);
                lines.push(`\n**כרטיסי אשראי:** ${credit.length} כרטיסים, חוב כולל ₪${debt.toLocaleString()}`);
            }

        } catch(e) {
            lines.push('\n(שגיאה בטעינת חלק מהנתונים)');
        }

        return lines.join('\n');
    }

    async function buildSystemPrompt() {
        const ctx = buildFinancialContext();
        const today = new Date().toLocaleDateString('he-IL', { year:'numeric', month:'long', day:'numeric' });

        let crossCtx = '';
        if (currentUser && typeof Plan !== 'undefined' && Plan.isYolo()) {
            crossCtx = await fetchCrossAppContext(currentUser.uid);
        }

        const yoloNote = crossCtx
            ? '\n- יש לך גישה לנתונים מכמה כלי WizeLife — השתמש בהם לתמונה פיננסית מלאה'
            : '';

        return `אתה יועץ פיננסי אישי של המשתמש, עם גישה מלאה לנתוניו הפיננסיים האמיתיים.
תאריך היום: ${today}

${ctx}${crossCtx}

הנחיות:
- ענה תמיד בעברית
- השתמש בנתונים האמיתיים שקיבלת כדי לתת עצות מדויקות ואישיות
- כאשר מתבקש חישוב (כמה זמן עד יעד, כמה חסכתי וכו') — בצע את החישוב בפועל
- היה ישיר ומעשי — תן המלצות ברורות, לא רק הסברים כלליים
- אם יש מידע חסר, ציין זאת בקצרה ותן הערכה בכל זאת
- פרמט תשובות ארוכות עם כותרות ורשימות לקריאות נוחה
- אל תחזור על כל הנתונים — השתמש בהם בצורה חכמה בתוך התשובה${yoloNote}`;
    }

    // ── Chat logic ──
    function renderMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const row = document.createElement('div');
        row.className = `chat-row ${role}`;
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble chat-${role}`;
        bubble.innerHTML = markdownToHtml(text);
        row.appendChild(bubble);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
        return bubble;
    }

    function markdownToHtml(text) {
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
            .replace(/^[-•]\s+(.+)$/gm, '• $1')
            .replace(/\n/g, '<br>');
    }

    function showTyping() {
        const container = document.getElementById('chatMessages');
        const row = document.createElement('div');
        row.className = 'chat-row assistant';
        row.id = 'typingIndicator';
        row.innerHTML = `<div class="chat-bubble chat-assistant" style="padding:14px 18px;">
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
            <span class="typing-dot"></span>
        </div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function removeTyping() {
        document.getElementById('typingIndicator')?.remove();
    }

    let currentUser = null;
    const aiProxy = firebase.functions().httpsCallable('aiProxy');

    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;

        if (!currentUser) {
            renderMessage('assistant', '🔒 יש להתחבר לחשבון כדי להשתמש ביועץ ה-AI. לחץ על "התחבר" בתפריט.');
            return;
        }

        document.getElementById('suggestions').style.display = 'none';
        input.value = '';
        autoResize(input);
        isLoading = true;
        document.getElementById('sendBtn').style.opacity = '0.5';

        renderMessage('user', text);
        conversationHistory.push({ role: 'user', parts: [{ text }] });

        showTyping();

        try {
            // Keep history as Gemini format; last message already added above
            const result = await aiProxy({
                messages: conversationHistory,
                system: await buildSystemPrompt(),
            });

            removeTyping();
            const reply = result.data.text;
            conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
            renderMessage('assistant', reply);
            saveHistory();
        } catch(e) {
            removeTyping();
            const code = e.code || '';
            if (code === 'functions/unauthenticated') {
                renderMessage('assistant', '🔒 יש להתחבר לחשבון.');
            } else if (code === 'functions/resource-exhausted') {
                renderMessage('assistant', '⏳ ' + (e.message || 'הגעת למגבלה היומית. נסה מחר.'));
            } else {
                renderMessage('assistant', '❌ שגיאה. בדוק חיבור לאינטרנט ונסה שוב.');
            }
        }

        isLoading = false;
        document.getElementById('sendBtn').style.opacity = '1';
        input.focus();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 160) + 'px';
    }

    function clearChat() {
        if (!confirm('לנקות את שיחה?')) return;
        conversationHistory = [];
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('suggestions').style.display = 'block';
        localStorage.removeItem(CHAT_HISTORY_KEY);
    }

    function saveHistory() {
        try {
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(conversationHistory.slice(-40)));
        } catch(e) {}
    }

    function loadHistory() {
        try {
            const saved = localStorage.getItem(CHAT_HISTORY_KEY);
            if (saved) {
                conversationHistory = JSON.parse(saved);
                conversationHistory.forEach(m => {
                    const role = m.role === 'model' ? 'assistant' : m.role;
                    const text = m.parts?.[0]?.text || m.content || '';
                    renderMessage(role, text);
                });
                if (conversationHistory.length > 0) {
                    document.getElementById('suggestions').style.display = 'none';
                }
            }
        } catch(e) {}
    }

    const YOLO_SUGGESTIONS = [
        'תן לי תמונה פיננסית מלאה מכל הכלים שלי',
        'איפה אני עומד ביחס ליעדי הבריאות והכספים שלי?',
        'מה ההוצאה הכי גדולה שלי על נסיעות לפי Mega Traveller?',
        'האם כדאי לי לנסוע לטיול עכשיו לפי המצב הכלכלי שלי?',
    ];

    function updateApiStatus(user) {
        const el = document.getElementById('apiStatus');
        if (user) {
            const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
            el.textContent = isYolo ? '✦ Yolo AI — כל הכלים' : '✓ AI מחובר';
            el.style.background = isYolo ? 'rgba(245,158,11,0.15)' : 'rgba(16,185,129,0.12)';
            el.style.color = isYolo ? '#f59e0b' : '#10b981';
        } else {
            el.textContent = '🔒 נדרשת התחברות';
            el.style.background = 'rgba(245,158,11,0.1)';
            el.style.color = '#f59e0b';
        }
    }

    // ── Suggestions ──
    function buildSuggestions() {
        const wrap = document.querySelector('#suggestions > div');
        const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
        const list = isYolo ? [...YOLO_SUGGESTIONS, ...SUGGESTIONS] : SUGGESTIONS;
        list.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'suggestion-chip';
            btn.textContent = q;
            btn.onclick = () => {
                document.getElementById('chatInput').value = q;
                sendMessage();
            };
            wrap.appendChild(btn);
        });
    }

    firebase.auth().onAuthStateChanged(async user => {
        currentUser = user;
        if (user && typeof Plan !== 'undefined') {
            await Plan.load();
            _crossAppData = null; // reset cache on login
        }
        updateApiStatus(user);
    });

    document.addEventListener('DOMContentLoaded', () => {
        if (typeof I18n !== 'undefined') I18n.init();
        buildSuggestions();
        loadHistory();
    });
</script>
</body>
</html>
