<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DB63NWYGX5"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-DB63NWYGX5');
    </script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="../img/logo.svg">
    <meta name="theme-color" content="#8b5cf6">
    <title>יועץ השקעות – WizeMoney</title>
    <link rel="stylesheet" href="../css/app.css">
</head>
<body>
<div class="app-container">
    <aside class="sidebar"></aside>

    <main class="main-content" style="padding:0;display:flex;flex-direction:column;height:100vh;overflow:hidden;">

        <!-- Top bar -->
        <div style="padding:18px 24px 14px;border-bottom:1px solid var(--color-border);flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div>
                <h1 style="font-size:1.4rem;font-weight:700;margin:0;">🌍 יועץ השקעות</h1>
                <p style="color:var(--color-text-secondary);font-size:0.82rem;margin:3px 0 0;">ניתוח שווקים גלובליים · מניות · ETF · אג"ח · קריפטו · נדל"ן · סחורות</p>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
                <span id="apiStatus" style="font-size:0.78rem;padding:4px 10px;border-radius:99px;background:var(--color-bg-hover);color:var(--color-text-secondary);">בודק חיבור...</span>
                <button onclick="clearChat()" style="padding:7px 14px;border-radius:9px;background:var(--color-bg-hover);border:1px solid var(--color-border);color:var(--color-text-secondary);font-size:0.82rem;cursor:pointer;">🗑 נקה</button>
            </div>
        </div>

        <!-- Disclaimer -->
        <div id="disclaimer" style="margin:12px 20px 0;padding:10px 14px;background:rgba(245,158,11,0.07);border:1px solid rgba(245,158,11,0.2);border-radius:10px;font-size:0.78rem;color:#d97706;line-height:1.5;flex-shrink:0;">
            ⚠️ <strong>הצהרת גילוי:</strong> המידע כאן הוא לצורכי מידע בלבד ואינו מהווה ייעוץ השקעות מורשה. אין לראות בתשובות המלצה לקנות או למכור ניירות ערך. כל החלטת השקעה היא באחריות המשתמש.
        </div>

        <!-- Market filter chips -->
        <div id="marketFilters" style="padding:12px 20px 0;flex-shrink:0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
            <span style="font-size:0.78rem;color:var(--color-text-secondary);margin-left:4px;">שוק:</span>
            <button class="mfilter active" data-filter="global" onclick="setFilter(this,'global')">🌍 גלובלי</button>
            <button class="mfilter" data-filter="us" onclick="setFilter(this,'us')">🇺🇸 ארה"ב</button>
            <button class="mfilter" data-filter="il" onclick="setFilter(this,'il')">🇮🇱 ישראל</button>
            <button class="mfilter" data-filter="eu" onclick="setFilter(this,'eu')">🇪🇺 אירופה</button>
            <button class="mfilter" data-filter="asia" onclick="setFilter(this,'asia')">🌏 אסיה</button>
            <button class="mfilter" data-filter="crypto" onclick="setFilter(this,'crypto')">₿ קריפטו</button>
            <button class="mfilter" data-filter="bonds" onclick="setFilter(this,'bonds')">📄 אג"ח</button>
            <button class="mfilter" data-filter="realestate" onclick="setFilter(this,'realestate')">🏠 נדל"ן</button>
        </div>

        <!-- Suggestions -->
        <div id="suggestions" style="padding:10px 20px 0;flex-shrink:0;">
            <div id="suggestionChips" style="display:flex;flex-wrap:wrap;gap:7px;"></div>
        </div>

        <!-- Chat messages -->
        <div id="chatMessages" style="flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:14px;"></div>

        <!-- Input bar -->
        <div style="padding:14px 24px 20px;border-top:1px solid var(--color-border);flex-shrink:0;padding-bottom:max(20px,env(safe-area-inset-bottom));">
            <div style="display:flex;gap:10px;align-items:flex-end;">
                <textarea id="chatInput"
                    placeholder="שאל על מניות, ETF, מאקרו, שווקים..."
                    rows="1"
                    style="flex:1;resize:none;padding:12px 14px;border-radius:14px;border:1px solid var(--color-border);background:var(--color-bg-hover);color:var(--color-text-primary);font-size:0.9rem;font-family:inherit;line-height:1.4;max-height:160px;overflow-y:auto;outline:none;"
                    onkeydown="handleKey(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button id="sendBtn" onclick="sendMessage()"
                    style="padding:12px 18px;background:linear-gradient(135deg,#8b5cf6,#6d28d9);border:none;border-radius:14px;color:white;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:opacity 0.2s;">
                    ➤
                </button>
            </div>
        </div>
    </main>
</div>

<style>
    .chat-bubble { max-width:75%;padding:12px 16px;border-radius:18px;font-size:0.9rem;line-height:1.55;white-space:pre-wrap;word-break:break-word; }
    .chat-user { align-self:flex-start;background:linear-gradient(135deg,#8b5cf6,#6d28d9);color:white;border-radius:18px 18px 4px 18px; }
    .chat-assistant { align-self:flex-end;background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:18px 18px 18px 4px;color:var(--color-text-primary); }
    .chat-row { display:flex; }
    .chat-row.user { justify-content:flex-start; }
    .chat-row.assistant { justify-content:flex-end; }
    .typing-dot { width:7px;height:7px;border-radius:50%;background:var(--color-text-secondary);animation:typingBounce 1.2s infinite ease-in-out;display:inline-block; }
    .typing-dot:nth-child(2) { animation-delay:0.15s; }
    .typing-dot:nth-child(3) { animation-delay:0.3s; }
    @keyframes typingBounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }
    .suggestion-chip { padding:7px 13px;border-radius:99px;border:1px solid var(--color-border);background:var(--color-bg-card);color:var(--color-text-primary);font-size:0.8rem;cursor:pointer;transition:background 0.15s,border-color 0.15s;white-space:nowrap; }
    .suggestion-chip:hover { background:var(--color-bg-hover);border-color:#8b5cf6;color:#8b5cf6; }
    .chat-assistant strong { color:#a78bfa; }
    .chat-assistant em { color:var(--color-text-secondary); }
    .mfilter { padding:4px 11px;border-radius:99px;border:1px solid var(--color-border);background:var(--color-bg-card);color:var(--color-text-secondary);font-size:0.78rem;cursor:pointer;transition:all 0.15s; }
    .mfilter.active { background:rgba(99,102,241,0.15);border-color:rgba(99,102,241,0.5);color:#818cf8;font-weight:700; }
    .mfilter:hover:not(.active) { border-color:#6366f1;color:#818cf8; }
</style>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js"></script>
<script src="../js/firebase-config.js"></script>
<script src="../js/idb.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/profiles.js"></script>
<script src="../js/storage.js"></script>
<script src="../js/i18n.js"></script>

<script>
    const CHAT_HISTORY_KEY = 'finsight_invest_chat_history';
    let conversationHistory = [];
    let isLoading = false;
    let currentUser = null;
    let activeFilter = 'global';

    const SUGGESTIONS = {
        global: [
            'ניתח את מצב השוק הגלובלי כרגע',
            'השוואה: S&P 500 מול MSCI World',
            'אילו סקטורים חזקים ב-2025?',
            'מה ההשפעה של ריבית Fed על המניות?',
            'הסבר מה זה ETF ואיך לבחור?',
            'איך מגדרים תיק בתקופת אי וודאות?',
        ],
        us: [
            'נתח את מניית Apple (AAPL)',
            'מה דעתך על NVIDIA לטווח ארוך?',
            'השוואה: MSFT מול GOOGL מול META',
            'S&P 500 vs NASDAQ — מה עדיף עכשיו?',
            'אילו מניות דיבידנד מומלצות ב-NYSE?',
            'הסבר את הסקטור Magnificent 7',
        ],
        il: [
            'נתח את ת"א 35 לעומת S&P 500',
            'אילו מניות ישראליות מעניינות ב-TASE?',
            'Check Point vs CyberArk — מה עדיף?',
            'השפעת המצב הגיאופוליטי על שוק ישראל',
            'קרנות מחקות בישראל — מה כדאי?',
            'מניות בנקים ישראלים — הזדמנות?',
        ],
        eu: [
            'DAX vs FTSE 100 — מה עדיף לאירופאי?',
            'מניות אירופאיות בתחום אנרגיה ירוקה',
            'LVMH ו-Luxury Goods אירופה — ניתוח',
            'השפעת ה-ECB על שוקי אירופה',
            'ETF על EURO STOXX 50 — כדאי?',
        ],
        asia: [
            'מה קורה בשוק הסיני כרגע?',
            'Alibaba vs Tencent — מה עדיף?',
            'יפן — Nikkei 225 הזדמנות או בועה?',
            'השפעת מדיניות ה-PBOC על מניות סין',
            'ETF על אסיה — אפשרויות ומה לבחור?',
        ],
        crypto: [
            'Bitcoin — ניתוח טכני + פונדמנטלי',
            'Ethereum vs Solana — מה עדיף לטווח ארוך?',
            'מה אחוז קריפטו מומלץ בתיק?',
            'Staking — איך עובד ומה הסיכונים?',
            'Bitcoin ETF — כדאי לקנות?',
        ],
        bonds: [
            'אג"ח ממשלתי ארה"ב — האם כדאי עכשיו?',
            'Treasury 10Y yield — מה המשמעות?',
            'אג"ח קונצרני vs ממשלתי — הבדלים',
            'Duration Risk — הסבר פשוט',
            'אג"ח ישראלי vs גלי עם קנייה עכשיו?',
        ],
        realestate: [
            'נדל"ן ישראל vs מניות — מה עדיף?',
            'REITs — איך משקיעים בנדל"ן דרך הבורסה?',
            'מגמות נדל"ן עולמי 2025',
            'REIT ETF — אילו מומלצים?',
            'נדל"ן vs אג"ח בסביבת ריבית גבוהה?',
        ],
    };

    function setFilter(el, filter) {
        activeFilter = filter;
        document.querySelectorAll('.mfilter').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        buildSuggestions();
    }

    function buildSuggestions() {
        const wrap = document.getElementById('suggestionChips');
        wrap.innerHTML = '';
        const list = SUGGESTIONS[activeFilter] || SUGGESTIONS.global;
        list.forEach(q => {
            const btn = document.createElement('button');
            btn.className = 'suggestion-chip';
            btn.textContent = q;
            btn.onclick = () => {
                document.getElementById('chatInput').value = q;
                sendMessage();
            };
            wrap.appendChild(btn);
        });
    }

    function getPortfolioContext() {
        const lines = [];
        try {
            const stocks = Storage.getStocks?.() || Storage.get('finance_stocks') || [];
            if (stocks.length) {
                const total = stocks.reduce((s, x) => s + (parseFloat(x.currentValue) || parseFloat(x.value) || 0), 0);
                lines.push('\n=== תיק המניות הנוכחי של המשתמש ===' );
                lines.push(`${stocks.length} אחזקות, שווי כולל: ₪${Math.round(total).toLocaleString('he-IL')}`);
                stocks.forEach(x => {
                    const val = parseFloat(x.currentValue) || parseFloat(x.value) || 0;
                    const gain = x.gainPercent != null ? ` (${x.gainPercent > 0 ? '+' : ''}${x.gainPercent}%)` : '';
                    lines.push(`  • ${x.symbol || x.name}: ₪${Math.round(val).toLocaleString('he-IL')}${gain}`);
                });
            }
            const funds = Storage.getMyFunds?.() || Storage.get('finance_my_funds') || [];
            if (funds.length) {
                const total = funds.reduce((s, f) => s + (parseFloat(f.currentValue) || parseFloat(f.balance) || 0), 0);
                lines.push('\n=== קרנות / מכשירי השקעה ===' );
                funds.forEach(f => {
                    const val = parseFloat(f.currentValue) || parseFloat(f.balance) || 0;
                    lines.push(`  • ${f.name} (${f.type || ''}): ₪${Math.round(val).toLocaleString('he-IL')}, דמי ניהול ${f.fee || '?'}%`);
                });
                lines.push(`סה"כ: ₪${Math.round(total).toLocaleString('he-IL')}`);
            }
        } catch(e) {}
        return lines.join('\n');
    }

    function buildSystemPrompt() {
        const portfolioCtx = getPortfolioContext();
        const filterName = {
            global: 'שוקי מניות גלובליים',
            us: 'שוק המניות האמריקאי (NYSE/NASDAQ)',
            il: 'שוק המניות הישראלי (TASE)',
            eu: 'שוקי אירופה',
            asia: 'שוקי אסיה (סין, יפן, קוריאה)',
            crypto: 'שוק הקריפטו',
            bonds: 'שוק האג"ח',
            realestate: 'נדל"ן ושוק ה-REIT',
        }[activeFilter] || 'שוקי השקעות';

        return `אתה יועץ השקעות מומחה עם ידע עמוק ב${filterName} ובכל מכשירי ההשקעה הגלובליים.

התמחויות שלך:
- שוק המניות: NYSE, NASDAQ, S&P 500, Dow Jones, ת"א 35, TASE, DAX, FTSE, Nikkei, Hang Seng, Shanghai
- ETFs: Vanguard, iShares, SPDR — ניתוח, השוואה, בחירה
- אג"ח: Treasuries, Corporate bonds, מח"מ, yield curve, duration risk
- קריפטו: Bitcoin, Ethereum, altcoins, DeFi, staking
- נדל"ן: REITs, מגמות נדל"ן גלובלי, REIT ETFs
- סחורות: זהב, נפט, גז, חיטה
- מאקרו: ריבית Fed/ECB/BoJ, אינפלציה, תשואות אג"ח, מדד PMI, earnings season
- ניתוח טכני: תמיכה/התנגדות, moving averages, RSI, MACD (ברמה בסיסית-בינונית)
- ניתוח פונדמנטלי: P/E, P/B, EPS, revenue growth, moat, valuation

${portfolioCtx ? portfolioCtx + '\n' : ''}
הנחיות:
- ענה תמיד בעברית
- תן ניתוח ספציפי ומעמיק, לא תשובות כלליות
- כאשר מנתח מניה — כלול: מה החברה עושה, מספרים עיקריים, תזה bullish ו-bearish, סיכום
- ציין תמיד: "אין בזה ייעוץ השקעות מורשה" בסוף תשובות עם המלצת קנייה/מכירה
- אם יש נתוני תיק — התייחס אליהם ותן המלצות ספציפיות לתיק של המשתמש
- פרמט תשובות עם כותרות ורשימות לקריאות נוחה
- היה ישיר: "אני חושב ש..." ולא "ייתכן שמשקיעים מסוימים..."`;
    }

    function renderMessage(role, text) {
        const container = document.getElementById('chatMessages');
        const row = document.createElement('div');
        row.className = `chat-row ${role}`;
        const bubble = document.createElement('div');
        bubble.className = `chat-bubble chat-${role}`;
        bubble.innerHTML = markdownToHtml(text);
        row.appendChild(bubble);
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
        return bubble;
    }

    function markdownToHtml(text) {
        return text
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/^#{1,3}\s+(.+)$/gm, '<strong>$1</strong>')
            .replace(/^[-•]\s+(.+)$/gm, '• $1')
            .replace(/\n/g, '<br>');
    }

    function showTyping() {
        const container = document.getElementById('chatMessages');
        const row = document.createElement('div');
        row.className = 'chat-row assistant';
        row.id = 'typingIndicator';
        row.innerHTML = `<div class="chat-bubble chat-assistant" style="padding:14px 18px;">
            <span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>
        </div>`;
        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }
    function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

    const aiProxy = firebase.functions().httpsCallable('aiProxy');

    async function sendMessage() {
        if (isLoading) return;
        const input = document.getElementById('chatInput');
        const text = input.value.trim();
        if (!text) return;
        if (!currentUser) { renderMessage('assistant', '🔒 נדרשת התחברות לשירות.'); return; }

        document.getElementById('suggestions').style.display = 'none';
        input.value = '';
        autoResize(input);
        isLoading = true;
        document.getElementById('sendBtn').style.opacity = '0.5';

        renderMessage('user', text);
        conversationHistory.push({ role: 'user', parts: [{ text }] });
        showTyping();

        try {
            const result = await aiProxy({
                messages: conversationHistory,
                system: buildSystemPrompt(),
            });
            removeTyping();
            const reply = result.data.text;
            conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
            renderMessage('assistant', reply);
            saveHistory();
        } catch(e) {
            removeTyping();
            const code = e.code || '';
            if (code === 'functions/resource-exhausted') {
                renderMessage('assistant', '⏳ הגעת למכסה היומית. נסה שוב מחר או שדרג תכנית.');
            } else {
                renderMessage('assistant', 'שגיאה בחיבור לשרת. נסה שוב.');
            }
        }

        isLoading = false;
        document.getElementById('sendBtn').style.opacity = '1';
        input.focus();
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    }
    function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

    function clearChat() {
        if (!confirm('למחוק את כל השיחה?')) return;
        conversationHistory = [];
        document.getElementById('chatMessages').innerHTML = '';
        document.getElementById('suggestions').style.display = 'block';
        localStorage.removeItem(CHAT_HISTORY_KEY);
    }

    function saveHistory() {
        try { localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(conversationHistory.slice(-40))); } catch(e) {}
    }
    function loadHistory() {
        try {
            const saved = localStorage.getItem(CHAT_HISTORY_KEY);
            if (saved) {
                conversationHistory = JSON.parse(saved);
                conversationHistory.forEach(m => {
                    const role = m.role === 'model' ? 'assistant' : m.role;
                    renderMessage(role, m.parts?.[0]?.text || '');
                });
                if (conversationHistory.length > 0) document.getElementById('suggestions').style.display = 'none';
            }
        } catch(e) {}
    }

    function updateApiStatus(user) {
        const el = document.getElementById('apiStatus');
        if (user) {
            const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
            el.textContent = isYolo ? '✦ YOLO' : '✓ מחובר';
            el.style.background = isYolo ? 'rgba(245,158,11,0.15)' : 'rgba(16,185,129,0.12)';
            el.style.color = isYolo ? '#f59e0b' : '#10b981';
        } else {
            el.textContent = '🔒 נדרשת התחברות';
            el.style.background = 'rgba(245,158,11,0.1)';
            el.style.color = '#f59e0b';
        }
    }

    firebase.auth().onAuthStateChanged(async user => {
        currentUser = user;
        if (user && typeof Plan !== 'undefined') await Plan.load();
        updateApiStatus(user);
    });

    document.addEventListener('DOMContentLoaded', () => {
        buildSuggestions();
        loadHistory();
    });
</script>
</body>
</html>
