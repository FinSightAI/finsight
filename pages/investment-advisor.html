            <span id="marketLabel" style="font-size:0.78rem;color:var(--color-text-secondary);margin-left:4px;"></span>

function getLang() {
    return (typeof I18n !== 'undefined' && I18n.current) || localStorage.getItem('wl_lang') || 'he';
}
function t() { return TX[getLang()] || TX.he; }

function applyLang() {
    const tx = t();
    const dir = getLang() === 'he' ? 'rtl' : 'ltr';
    document.documentElement.lang = getLang() === 'he' ? 'he' : getLang() === 'pt' ? 'pt' : getLang() === 'es' ? 'es' : 'en';
    document.documentElement.dir = dir;
    document.getElementById('pageTitle').textContent = tx.title;
    document.getElementById('pageSubtitle').textContent = tx.subtitle;
    document.getElementById('disclaimer').innerHTML = tx.disclaimer;
    document.getElementById('marketLabel').textContent = tx.marketLabel;
    document.getElementById('chatInput').placeholder = tx.placeholder;
    document.getElementById('clearBtn').textContent = tx.clearBtn;
    // Update filter button labels
    document.querySelectorAll('.mfilter').forEach(btn => {
        const key = btn.dataset.filter;
        if (tx.filters[key]) btn.textContent = tx.filters[key];
    });
    buildSuggestions();
    updateApiStatus(currentUser);
}

function setFilter(el, filter) {
    activeFilter = filter;
    document.querySelectorAll('.mfilter').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    buildSuggestions();
}

function buildSuggestions() {
    const wrap = document.getElementById('suggestionChips');
    wrap.innerHTML = '';
    const list = (t().suggestions[activeFilter] || t().suggestions.global);
    list.forEach(q => {
        const btn = document.createElement('button');
        btn.className = 'suggestion-chip';
        btn.textContent = q;
        btn.onclick = () => { document.getElementById('chatInput').value = q; sendMessage(); };
        wrap.appendChild(btn);
    });
}

// ─── Market Data via Firebase Function (server-side, Firestore cached) ──────
const marketDataFn = firebase.functions().httpsCallable('marketData');
const _mdLocalCache = {}; // in-memory cache within this session

async function fetchMarketData(ticker) {
    const key = ticker.toUpperCase();
    // Check in-memory cache (TTL: 1h)
    if (_mdLocalCache[key] && Date.now() - _mdLocalCache[key].ts < 3600000) {
        return _mdLocalCache[key].data;
    }
    try {
        const res = await marketDataFn({ ticker: key });
        const d = res.data;
        if (d?.price) {
            _mdLocalCache[key] = { ts: Date.now(), data: d };
            return d;
        }
    } catch(e) { console.warn('marketData failed for', key, e.message); }
    return null;
}

// Extract ticker symbols mentioned in user message
function extractTickers(text) {
    const matches = text.match(/\b([A-Z]{1,5}(?:\.[A-Z]{1,2})?)\b/g) || [];
    const skip = new Set(['AI','ETF','RSI','MACD','SMA','EMA','IPO','CEO','PE','EPS','GDP','CPI','FED','ECB','USA','EU','US','OK','PM','AM','MA','BB','IV']);
    return [...new Set(matches.filter(m => !skip.has(m) && m.length >= 2))].slice(0, 3);
}

function formatMarketContext(d) {
    if (!d?.price) return '';
    const isHe = getLang() === 'he';
    const lines = [`\n=== ${isHe ? 'נתוני שוק חיים' : 'Live Market Data'}: ${d.name || d.ticker} (${d.ticker}) ===`];

    lines.push(`${isHe ? 'מחיר' : 'Price'}: $${d.price}  ${d.changePct >= 0 ? '+' : ''}${d.changePct}% ${isHe ? 'היום' : 'today'}`);
    if (d.high) lines.push(`${isHe ? 'טווח יומי' : 'Range'}: $${d.low}–$${d.high}${d.volume ? '  |  Vol: ' + d.volume : ''}`);

    // Technical analysis
    const ta = [];
    if (d.rsi != null) {
        const r = parseFloat(d.rsi);
        const tag = r > 70 ? (isHe ? 'קנוי יתר ⚠️' : 'Overbought ⚠️') : r < 30 ? (isHe ? 'מכור יתר ⚠️' : 'Oversold ⚠️') : (isHe ? 'נייטרלי' : 'Neutral');
        ta.push(`RSI(14): ${d.rsi} (${tag})`);
    }
    if (d.macd != null) {
        const bull = parseFloat(d.macdHist) > 0;
        ta.push(`MACD: ${d.macd} | Signal: ${d.macdSig} | Hist: ${d.macdHist} → ${bull ? (isHe ? 'מומנטום חיובי 📈' : 'Bullish 📈') : (isHe ? 'מומנטום שלילי 📉' : 'Bearish 📉')}`);
    }
    if (d.sma50 && d.price) {
        const abv = parseFloat(d.price) > parseFloat(d.sma50);
        ta.push(`SMA50: $${d.sma50} → ${isHe ? 'מחיר' : 'Price'} ${abv ? (isHe ? 'מעל' : 'above') : (isHe ? 'מתחת' : 'below')} SMA50`);
    }
    if (d.sma200 && d.price && d.sma50) {
        const gc = parseFloat(d.sma50) > parseFloat(d.sma200);
        ta.push(`SMA200: $${d.sma200} → ${gc ? (isHe ? 'Golden Cross ✨' : 'Golden Cross ✨') : (isHe ? 'Death Cross ⚠️' : 'Death Cross ⚠️')}`);
    }
    if (ta.length) lines.push('\n' + (isHe ? 'ניתוח טכני:' : 'Technical Analysis:'), ...ta.map(l => '  ' + l));

    // News
    if (d.news?.length) {
        lines.push('\n' + (isHe ? 'חדשות אחרונות (3 ימים):' : 'Recent news (3 days):'));
        d.news.forEach(n => lines.push(`  • [${n.source}] ${n.headline}`));
    }
    return lines.join('\n');
}


function getLivePrice(symbol) {
    // Read from StockAPI localStorage cache (sp_SYMBOL)
    const variants = [symbol, symbol.replace(':', '-'), symbol.split(':').pop()];
    for (const s of variants) {
        try {
            const raw = localStorage.getItem('sp_' + s);
            if (!raw) continue;
            const { ts, data } = JSON.parse(raw);
            if (Date.now() - ts < 24 * 60 * 60 * 1000) return data; // fresh within 24h
        } catch(e) {}
    }
    return null;
}

function getPortfolioContext() {
    const tx = t();
    const lines = [];
    try {
        const stockData = Storage.getStocks?.() || { holdings: [] };
        const stocks = stockData.holdings || stockData || [];
        if (stocks.length) {
            const total = stocks.reduce((s, x) => s + (parseFloat(x.currentValue) || parseFloat(x.value) || 0), 0);
            lines.push('\n' + tx.portfolioHeader);
            lines.push(`${stocks.length} ${tx.portfolioLabel} ₪${Math.round(total).toLocaleString()}`);
            stocks.forEach(x => {
                const live = getLivePrice(x.symbol);
                const currentP = live?.currentPrice || x.currentPrice || x.avgPrice;
                const val = currentP ? currentP * (x.quantity || 1) : (parseFloat(x.currentValue) || parseFloat(x.value) || 0);
                const dailyChg = live?.priceChangePercent != null ? ` יומי:${live.priceChangePercent >= 0 ? '+' : ''}${live.priceChangePercent.toFixed(1)}%` : '';
                const gainPct = x.avgPrice && currentP ? (((currentP - x.avgPrice) / x.avgPrice) * 100).toFixed(1) : null;
                const gainStr = gainPct ? ` רווח:${gainPct >= 0 ? '+' : ''}${gainPct}%` : '';
                const liveTag = live ? ` [${currentP?.toFixed(2)}]` : '';
                lines.push(`  • ${x.symbol || x.name}${liveTag}: ₪${Math.round(val).toLocaleString()}${gainStr}${dailyChg}`);
            });
        }
        const funds = Storage.getMyFunds?.() || Storage.get('finance_my_funds') || [];
        if (funds.length) {
            const total = funds.reduce((s, f) => s + (parseFloat(f.currentValue) || parseFloat(f.balance) || 0), 0);
            lines.push('\n' + tx.fundsHeader);
            funds.forEach(f => {
                const val = parseFloat(f.currentValue) || parseFloat(f.balance) || 0;
                lines.push(`  • ${f.name} (${f.type || ''}): ₪${Math.round(val).toLocaleString()}, ${tx.feesLabel} ${f.fee || '?'}%`);
            });
            lines.push(`${tx.totalLabel} ₪${Math.round(total).toLocaleString()}`);
        }
        const goals = Storage.get('finance_goals') || [];
        if (goals.length) {
            lines.push('\n' + tx.goalsHeader);
            goals.forEach(g => {
                const pct = g.targetAmount > 0 ? Math.round(((g.currentAmount||0)/g.targetAmount)*100) : 0;
                lines.push(`  • ${g.name}: ₪${Math.round(g.currentAmount||0).toLocaleString()} / ₪${Math.round(g.targetAmount||0).toLocaleString()} (${pct}%)${g.deadline ? ', ' + tx.deadlineLabel + ': ' + g.deadline : ''}`);
            });
        }
        const bank = Storage.getBankAccounts?.() || [];
        if (bank.length) {
            const total = bank.reduce((s, a) => s + (parseFloat(a.balance) || 0), 0);
            lines.push('\n' + tx.bankHeader + ` ₪${Math.round(total).toLocaleString()}`);
        }
    } catch(e) {}
    return lines.join('\n');
}

function buildSystemPrompt() {
    const tx = t();
    const portfolioCtx = getPortfolioContext();
    return tx.systemBase + (portfolioCtx ? '\n' + portfolioCtx : '');
}

function renderMessage(role, text) {
    const container = document.getElementById('chatMessages');
    const row = document.createElement('div');
    row.className = `chat-row ${role}`;
    const bubble = document.createElement('div');
    bubble.className = `chat-bubble chat-${role}`;
    bubble.innerHTML = markdownToHtml(text);
    row.appendChild(bubble);
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
}

function markdownToHtml(text) {
    return text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
        .replace(/\*(.+?)\*/g,'<em>$1</em>')
        .replace(/^#{1,3}\s+(.+)$/gm,'<strong>$1</strong>')
        .replace(/^[-•]\s+(.+)$/gm,'• $1')
        .replace(/\n/g,'<br>');
}

function showTyping() {
    const container = document.getElementById('chatMessages');
    const row = document.createElement('div');
    row.className = 'chat-row assistant';
    row.id = 'typingIndicator';
    row.innerHTML = '<div class="chat-bubble chat-assistant" style="padding:14px 18px;"><span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span></div>';
    container.appendChild(row);
    container.scrollTop = container.scrollHeight;
}
function removeTyping() { document.getElementById('typingIndicator')?.remove(); }

const aiProxy = firebase.functions().httpsCallable('aiProxy');

async function sendMessage() {
    if (isLoading) return;
    const input = document.getElementById('chatInput');
    const text = input.value.trim();
    if (!text) return;
    if (!currentUser) { renderMessage('assistant', t().loginMsg); return; }

    document.getElementById('suggestions').style.display = 'none';
    input.value = '';
    autoResize(input);
    isLoading = true;
    document.getElementById('sendBtn').style.opacity = '0.5';

    renderMessage('user', text);
    conversationHistory.push({ role: 'user', parts: [{ text }] });
    showTyping();

    try {
        const result = await aiProxy({ messages: conversationHistory, system: buildSystemPrompt() });
        removeTyping();
        const reply = result.data.text;
        conversationHistory.push({ role: 'model', parts: [{ text: reply }] });
        renderMessage('assistant', reply);
        saveHistory();
    } catch(e) {
        removeTyping();
        renderMessage('assistant', e.code === 'functions/resource-exhausted' ? t().rateLimit : t().error);
    }

    isLoading = false;
    document.getElementById('sendBtn').style.opacity = '1';
    input.focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 160) + 'px'; }

function clearChat() {
    if (!confirm(t().clearConfirm)) return;
    conversationHistory = [];
    document.getElementById('chatMessages').innerHTML = '';
    document.getElementById('suggestions').style.display = 'block';
    localStorage.removeItem(CHAT_HISTORY_KEY);
}
function saveHistory() { try { localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(conversationHistory.slice(-40))); } catch(e) {} }
function loadHistory() {
    try {
        const saved = localStorage.getItem(CHAT_HISTORY_KEY);
        if (saved) {
            conversationHistory = JSON.parse(saved);
            conversationHistory.forEach(m => renderMessage(m.role === 'model' ? 'assistant' : m.role, m.parts?.[0]?.text || ''));
            if (conversationHistory.length > 0) document.getElementById('suggestions').style.display = 'none';
        }
    } catch(e) {}
}

function updateApiStatus(user) {
    const el = document.getElementById('apiStatus');
    const tx = t();
    if (user) {
        const isYolo = typeof Plan !== 'undefined' && Plan.isYolo();
        el.textContent = isYolo ? tx.yolo : tx.connected;
        el.style.background = isYolo ? 'rgba(245,158,11,0.15)' : 'rgba(16,185,129,0.12)';
        el.style.color = isYolo ? '#f59e0b' : '#10b981';
    } else {
        el.textContent = tx.loginRequired;
        el.style.background = 'rgba(245,158,11,0.1)';
        el.style.color = '#f59e0b';
    }
}

firebase.auth().onAuthStateChanged(async user => {
    currentUser = user;
    if (user && typeof Plan !== 'undefined') await Plan.load();
    updateApiStatus(user);
});

document.addEventListener('DOMContentLoaded', () => {
    if (typeof I18n !== 'undefined') {
        I18n.init();
        const origSet = I18n.setLanguage?.bind(I18n);
        if (origSet) I18n.setLanguage = lang => { origSet(lang); applyLang(); };
    }
    applyLang();
    loadHistory();
});
