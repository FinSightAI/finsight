<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Activating your plan… — WizeMoney</title>
<style>
  body { margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
         background: #0d1117; font-family: system-ui, sans-serif; color: #f0f4ff; text-align: center; padding: 24px; }
  .box { max-width: 400px; }
  .icon { font-size: 3rem; margin-bottom: 16px; }
  h1 { font-size: 1.4rem; font-weight: 700; margin: 0 0 8px; }
  p { color: #8892a4; font-size: 0.95rem; margin: 0 0 24px; }
  .spinner { width: 40px; height: 40px; border: 3px solid rgba(99,102,241,0.2);
             border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite;
             margin: 0 auto 24px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .btn { display: inline-block; padding: 12px 28px; background: #6366f1; color: #fff;
         border-radius: 10px; text-decoration: none; font-weight: 700; font-size: 0.95rem; }
</style>
</head>
<body>
<div class="box" id="box">
  <div class="spinner" id="spinner"></div>
  <h1 id="title">מפעיל את התוכנית שלך…</h1>
  <p id="sub">אנא המתן מספר שניות</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js" integrity="sha384-ViccRjS0k/lvYsrtaKXk+ES61/4PAZlFI/mPHmLC1YWzK0AIbXbI5ZXDzcm3F8gH" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js" integrity="sha384-+/4lqMnmLqwbdHXshvGDmBTeWlNoPRdjXi4ZsiBj10EhQXaTBe3RF5JZktdSjug6" crossorigin="anonymous"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-functions-compat.js" integrity="sha384-lONBStWloxmdvtJe8gp4aEOmE9dluTdSdGA5pUHFYPBMJRUDDPSdbq32bb0Spi3v" crossorigin="anonymous"></script>
<script src="../js/firebase-config.js"></script>
<script>
(async function () {
  const params = new URLSearchParams(location.search);
  const subscriptionId = params.get('subscription_id') || params.get('token');

  function show(icon, title, sub, btnText, btnHref) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('box').innerHTML =
      `<div class="icon">${icon}</div><h1>${title}</h1><p>${sub}</p>` +
      (btnText ? `<a class="btn" href="${btnHref}">${btnText}</a>` : '');
  }

  if (!subscriptionId) {
    show('❌', 'Missing subscription ID', 'Something went wrong. Please contact support.', 'Back to WizeMoney', '/finsight/');
    return;
  }

  // Wait for Firebase auth
  await new Promise(resolve => {
    const unsub = firebase.auth().onAuthStateChanged(user => { unsub(); resolve(user); });
  });

  const user = firebase.auth().currentUser;
  if (!user) {
    // Not signed in — redirect to login with return param
    location.href = '/finsight/?paypal_sub=' + encodeURIComponent(subscriptionId);
    return;
  }

  try {
    const fn = firebase.functions().httpsCallable('verifyPaypalSubscription');
    const result = await fn({ subscriptionId });
    const plan = result.data && result.data.plan;
    const label = plan === 'yolo' ? 'YOLO ⚡' : 'Pro';
    show('🎉', `${label} מופעל!`, 'החשבון שלך שודרג בהצלחה. כל התכונות פתוחות.', 'פתח את WizeMoney', '/finsight/');
  } catch (err) {
    console.error('verifyPaypalSubscription error:', err);
    const msg = err.code === 'functions/permission-denied'
      ? 'המנוי שייך לחשבון אחר.'
      : err.code === 'functions/failed-precondition'
      ? 'המנוי עדיין לא פעיל ב-PayPal. נסה שוב בעוד דקה.'
      : 'שגיאה בהפעלה — נסה להתחבר מחדש או פנה לתמיכה.';
    show('⚠️', 'בעיה בהפעלה', msg, 'חזור ל-WizeMoney', '/finsight/');
  }
})();
</script>
</body>
</html>
